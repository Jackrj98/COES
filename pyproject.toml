[tool.pytest.ini_options]
# Forzar entorno de testing
env = [
    "DJANGO_SETTINGS_MODULE=cfg.settings.testing"
]
DJANGO_SETTINGS_MODULE = "cfg.settings.testing"

[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    migrations
  | __pycache__
  | build
  | dist
  | \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | coes-env
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
    "venv",
    "coes-env",
    "migrations",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "D", "UP"]
ignore = [
    "D100", "D104", "D401",
    "E203",
    "D101", "D102", "D103",
    "D105", "D106", "D107",
    "D200", "D205",
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"**/settings/*.py" = ["F403", "F405"]
"**/__init__.py" = ["F401"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
combine-as-imports = true
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
disallow_untyped_defs = false
check_untyped_defs = true
strict_optional = true
warn_unused_ignores = true
show_error_codes = true
exclude = ["build", "dist", ".venv", "coes-env", "migrations"]


testpaths = ["apps"]
python_files = ["test_*.py", "*_tests.py", "tests.py"]
python_classes = ["Test*", "*Test"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--durations=5",
    "--showlocals",
    "--no-warnings",
    "--strict-markers"
]
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests"
]