[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    migrations
  | __pycache__
  | build
  | dist
  | \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | coes-env
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
# Crucial: Añadir coes-env aquí para que Ruff no analice las librerías
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
    "venv",
    "coes-env",
    "migrations",
]

[tool.ruff.lint]
# E/W: pycodestyle, F: Pyflakes, I: isort, D: pydocstyle, UP: pyupgrade
select = ["E", "W", "F", "I", "D", "UP"]

ignore = [
    "D100", "D104", "D401",
    "E203",                  # Conflicto con Black (espacios antes de ':')
    "D101", "D102", "D103", # Ignorar docstrings faltantes en clases/métodos (opcional)
    "D105", "D106", "D107",
    "D200", "D205",
    "E501",                  # Dejar que Black maneje el largo de línea
]

[tool.ruff.lint.per-file-ignores]
# F403/F405 son comunes en los __init__.py o archivos de settings con import *
"**/settings/*.py" = ["F403", "F405"]
"**/__init__.py" = ["F401"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
combine-as-imports = true
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
disallow_untyped_defs = false # Cambiado a false temporalmente si tienes código sin tipos
check_untyped_defs = true
strict_optional = true
warn_unused_ignores = true
show_error_codes = true
# Mypy también necesita ignorar explícitamente el entorno
exclude = ["build", "dist", ".venv", "coes-env", "migrations"]