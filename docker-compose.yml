services:
  nginx:
    image: nginx:alpine
    container_name: coes_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./build/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/coes/staticfiles:ro  
      - ./media:/app/coes/media:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - coes_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: coes_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coes_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: coes_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coes_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: build/docker/Dockerfile
    container_name: coes_web
    command: make run-prod
    restart: unless-stopped
    env_file: .env
    environment:
      - DOCKER=1
      - ENV=production
    volumes:
      - ./staticfiles:/app/coes/staticfiles
      - ./media:/app/coes/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coes_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery:
    build:
      context: .
      dockerfile: build/docker/Dockerfile
    container_name: coes_celery
    restart: unless-stopped
    command: make celery
    env_file: .env
    environment:
      - DOCKER=1
      - ENV=production
    volumes:
      - ./media:/app/coes/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coes_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery-beat:
    build:
      context: .
      dockerfile: build/docker/Dockerfile
    container_name: coes_celery_beat
    command: make celery-beat
    restart: unless-stopped
    env_file: .env
    environment:
      - DOCKER=1
      - ENV=production
    volumes:
      - ./media:/app/coes/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coes_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  coes_network:
    driver: bridge

volumes:
  postgres_prod_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local