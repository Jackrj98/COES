services:
  nginx:
    image: nginx:alpine
    container_name: coes_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./build/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/coes/staticfiles:ro  
      - ./media:/app/coes/media:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/nginx/ssl
    depends_on:
      - web
    networks:
      - coes_network

  db:
    image: postgres:16-alpine
    container_name: coes_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${DB_VOLUME_PATH:-postgres_data}:/var/lib/postgresql/data
    env_file: .env.production
    ports:
      - "5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coes_network

  redis:
    image: redis:7-alpine
    container_name: coes_redis
    restart: unless-stopped
    ports:
      - "6380:6379" # HOST EXTERN:INTERN
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coes_network

  web:
    build:
      context: .
      dockerfile: build/docker/Dockerfile
    container_name: coes_web
    command: make run-prod ENV=production
    environment:
      DOCKER: "1"
      ENV: "production"
      PORT: ${PORT:-8000}
    restart: unless-stopped
    volumes:
      - .:/app/coes
      - ./staticfiles:/app/coes/staticfiles
      - ./media:/app/coes/media
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    networks:
      - coes_network

  celery:
    build:
      context: .
      dockerfile: build/docker/Dockerfile
    container_name: coes_celery
    restart: unless-stopped
    command: make celery ENV=production
    environment:
      DOCKER: "1"
      ENV: ${ENV:-production}
    env_file:
      - .env.production
    volumes:
      - .:/app/coes
      - ./media:/app/coes/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coes_network

  celery-beat:
    build:
      context: .
      dockerfile: build/docker/Dockerfile
    container_name: coes_celery_beat
    command: make celery-beat ENV=production
    restart: unless-stopped
    environment:
      DOCKER: "1"
      ENV: production
    env_file:
      - .env.production
    volumes:
      - .:/app/coes
      - ./media:/app/coes/media
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coes_network

networks:
  coes_network:
    driver: bridge

volumes:
  postgres_data:
  static_volume:
  media_volume: