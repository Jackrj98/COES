upstream django_server {
    server web:8000; 
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;

    # Redirige todo el tráfico HTTP a HTTPS (habilitar cuando tengas SSL)
    # return 301 https://$host$request_uri;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /app/coes/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform, max-age=2592000";
    }

    location /media/ {
        alias /app/coes/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform, max-age=2592000";
    }

    location / {
        proxy_pass         http://django_server;
        proxy_redirect     off;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    access_log /var/log/nginx/coes_access.log;
    error_log  /var/log/nginx/coes_error.log;
}