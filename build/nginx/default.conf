upstream django_server {
    server unix:/tmp/gunicorn-coes.sock;
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;

    # Redirige todo el tráfico HTTP a HTTPS (habilitar cuando tengas SSL)
    # return 301 https://$host$request_uri;

    location /static/ {
        alias /app/coes/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform, max-age=2592000";
    }

    location /media/ {
        alias /app/coes/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform, max-age=2592000";
    }

    location / {
        proxy_pass         http://django_server;
        proxy_redirect     off;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    access_log /var/log/nginx/coes_access.log;
    error_log  /var/log/nginx/coes_error.log;
}

server {
    listen 443 ssl;
    server_name tu-dominio.com;
    server_tokens off;
    client_max_body_size 20M;

    # Certificados SSL
    ssl_certificate     /ruta/a/certificados/certificado.crt;
    ssl_certificate_key /ruta/a/certificados/certificado.key;
    # ssl_dhparam       /ruta/a/certificados/dhparam.pem;

    # Protocolos y cifrados
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:EECDH+AESGCM:EDH+AESGCM;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Headers de seguridad (solo en HTTPS)
    add_header X-Content-Type-Options      "nosniff"                            always;
    add_header X-XSS-Protection            "1; mode=block"                      always;
    add_header X-Frame-Options             "SAMEORIGIN"                         always;
    add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"    always;
    add_header Content-Security-Policy     "default-src 'self'"                 always;  # ajustar según el proyecto

    location /static/ {
        alias /app/coes/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform, max-age=2592000";
    }

    location /media/ {
        alias /app/coes/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform, max-age=2592000";
    }

    location / {
        proxy_pass         http://django_server;
        proxy_redirect     off;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    access_log /var/log/nginx/coes_access.log;
    error_log  /var/log/nginx/coes_error.log;
}