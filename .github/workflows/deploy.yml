name: Deploy to Digital Ocean

on:
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set release version
        run: echo "RELEASE_VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/coes-web:latest
            ghcr.io/${{ env.OWNER_LC }}/coes-web:${{ env.RELEASE_VERSION }}
            ghcr.io/${{ env.OWNER_LC }}/coes-web:${{ github.sha }}

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,RELEASE_VERSION
          script: |
            cd ~/COES
            cat <<EOF > .env
            # Application settings
            ENV=production
            RELEASE_VERSION=$RELEASE_VERSION
            DOMAIN=${{ secrets.DOMAIN }}
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
            DJANGO_SETTINGS_MODULE=${{ secrets.DJANGO_SETTINGS_MODULE }}

            # Database settings
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_ENGINE=${{ secrets.DB_ENGINE }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_VOLUME_PATH=${{ secrets.DB_VOLUME_PATH }}

            # Email settings
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            SERVER_EMAIL=${{ secrets.SERVER_EMAIL }}
            EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS }}
            EMAIL_USE_SSL=${{ secrets.EMAIL_USE_SSL }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}

            # Redis settings
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_PORT_HOST=${{ secrets.REDIS_PORT_HOST }}

            # Security settings
            CSRF_COOKIE_SECURE=${{ secrets.CSRF_COOKIE_SECURE }}
            SECURE_SSL_REDIRECT=${{ secrets.SECURE_SSL_REDIRECT }}
            SESSION_COOKIE_SECURE=${{ secrets.SESSION_COOKIE_SECURE }}
            SECURE_HSTS_SECONDS=${{ secrets.SECURE_HSTS_SECONDS }}
            SECURE_HSTS_INCLUDE_SUBDOMAINS=${{ secrets.SECURE_HSTS_INCLUDE_SUBDOMAINS }}
            SECURE_HSTS_PRELOAD=${{ secrets.SECURE_HSTS_PRELOAD }}
            CSRF_COOKIE_HTTPONLY=${{ secrets.CSRF_COOKIE_HTTPONLY }}
            SESSION_COOKIE_HTTPONLY=${{ secrets.SESSION_COOKIE_HTTPONLY }}
            EOF
            
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            docker pull ghcr.io/$OWNER_LC/coes-web:$RELEASE_VERSION  
            
            export IMAGE_TAG=$RELEASE_VERSION
            export OWNER_LC=$OWNER_LC
            
            docker compose -f docker-compose.yml up -d --remove-orphans --pull always
            docker image prune -f
            echo "Deployed: $RELEASE_VERSION"
            docker compose -f docker-compose.yml ps
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          OWNER_LC: ${{ env.OWNER_LC }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}