{% load navigation_tags %}
<div id="sidebar">
    <div class="sidebar-wrapper active">
        <div class="sidebar-header position-relative">
            <div class="d-flex justify-content-between align-items-center">
                <div class="logo">
                    <a href="#"><img src="{% static 'assets/compiled/svg/logo.svg' %}" alt="Logo" srcset=""></a>
                </div>
                <div class="sidebar-toggler  x">
                    <a href="#" class="sidebar-hide d-xl-none d-block"><i class="bi bi-x bi-middle"></i></a>
                </div>
            </div>
        </div>
        <div class="sidebar-menu">
            <ul class="menu">
                <li class="sidebar-title">Menu</li>

                <li class="sidebar-item {% active 'core:home' %}">
                    <a href="{% url 'core:home' %}" class='sidebar-link'>
                        <i class="bi bi-grid-fill"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li class="sidebar-title">{% trans 'administration'|capfirst %}</li>
                <li class="sidebar-item  {% active 'security:users:list' %}">
                    <a href="{% url 'security:users:list' %}" class='sidebar-link'>
                        <i class="bi bi-people-fill"></i>
                        <span>{% trans 'users'|capfirst %}</span>
                    </a>
                </li>

                {% if request.user.is_superuser %}
                    <li class="sidebar-item">
                        <a href="{% url 'admin:index' %}" class='sidebar-link' target="_blank">
                            <i class="bi bi-shield-lock-fill"></i>
                            <span>{% trans 'admin site'|capfirst %}</span>
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</div>
